name: Test direnv with custom direnv version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          masks: ''
          direnvVersion: '2.36.0'
          path: ${{ github.workspace }}
      - name: Assert direnv is installed and env vars are exported
        run: |
          echo "DIRENV_ACTION_TEST=$DIRENV_ACTION_TEST"
          if [ "$DIRENV_ACTION_TEST" != "HatsuneMiku3939" ]; then
            echo "FAIL: expected DIRENV_ACTION_TEST=HatsuneMiku3939, got '$DIRENV_ACTION_TEST'"
            exit 1
          fi
          echo "PASS"
      - name: Assert direnv version is correct
        run: |
          INSTALLED_VERSION=$(direnv version)
          echo "installed direnv version: $INSTALLED_VERSION"
          if [ "$INSTALLED_VERSION" != "2.36.0" ]; then
            echo "FAIL: expected direnv version 2.36.0, got '$INSTALLED_VERSION'"
            exit 1
          fi
          echo "PASS"
