name: Test direnv with custom version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          masks: ''
          direnvVersion: '2.35.0'
          path: ${{ github.workspace }}

      - name: Assert direnv is installed and correct version is used
        run: |
          DIRENV_VERSION=$(direnv version)
          echo "direnv version: $DIRENV_VERSION"
          if [ "$DIRENV_VERSION" != "2.35.0" ]; then
            echo "FAIL: expected direnv version 2.35.0, got '$DIRENV_VERSION'"
            exit 1
          fi
          echo "PASS: direnv version is correct"

      - name: Assert env vars are still exported with custom version
        run: |
          echo "DIRENV_ACTION_TEST=$DIRENV_ACTION_TEST"
          if [ "$DIRENV_ACTION_TEST" != "HatsuneMiku3939" ]; then
            echo "FAIL: expected DIRENV_ACTION_TEST=HatsuneMiku3939, got '$DIRENV_ACTION_TEST'"
            exit 1
          fi
          echo "PASS: env vars exported correctly with custom direnv version"
