name: Test direnv with required environment variables
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          masks: ''
          required: |
            DIRENV_ACTION_TEST
            SECRET1
            SECRET2
          path: ${{ github.workspace }}
      - name: Assert DIRENV_ACTION_TEST is exported
        run: |
          echo "DIRENV_ACTION_TEST=$DIRENV_ACTION_TEST"
          if [ "$DIRENV_ACTION_TEST" != "HatsuneMiku3939" ]; then
            echo "FAIL: expected DIRENV_ACTION_TEST=HatsuneMiku3939, got '$DIRENV_ACTION_TEST'"
            exit 1
          fi
          echo "PASS"
      - name: Assert SECRET1 is exported
        run: |
          echo "SECRET1 is set: $([ -n "$SECRET1" ] && echo yes || echo no)"
          if [ "$SECRET1" != "ULTRA_SECRET1" ]; then
            echo "FAIL: expected SECRET1=ULTRA_SECRET1, got '$SECRET1'"
            exit 1
          fi
          echo "PASS"
