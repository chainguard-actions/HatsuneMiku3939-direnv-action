name: Test direnv fails when required variable is missing
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          masks: ''
          required: |
            ONLY_VAR
            MISSING_VAR
          path: ${{ github.workspace }}/tests/fixtures/minimal-envrc
        continue-on-error: true
      - name: Assert action failed due to missing required variable
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when required variable is missing, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed when required variable was missing"
