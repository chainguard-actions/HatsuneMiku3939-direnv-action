name: Test basic direnv usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create .envrc file
        run: |
          cat > "$GITHUB_WORKSPACE/.envrc" << 'EOF'
          export MY_VAR=hello_world
          export ANOTHER_VAR=foobar
          EOF
      - id: action
        uses: .
        with:
          masks: ''
          direnvVersion: '2.37.1'
          path: .
      - name: Assert MY_VAR is exported
        run: |
          echo "MY_VAR: $MY_VAR"
          if [ "$MY_VAR" != "hello_world" ]; then
            echo "FAIL: expected MY_VAR='hello_world', got '$MY_VAR'"
            exit 1
          fi
          echo "PASS: MY_VAR is correct"
      - name: Assert ANOTHER_VAR is exported
        run: |
          echo "ANOTHER_VAR: $ANOTHER_VAR"
          if [ "$ANOTHER_VAR" != "foobar" ]; then
            echo "FAIL: expected ANOTHER_VAR='foobar', got '$ANOTHER_VAR'"
            exit 1
          fi
          echo "PASS: ANOTHER_VAR is correct"
